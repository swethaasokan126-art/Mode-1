<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sign In</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
    <form id="signinForm" class="form-box">
        <h2><em>SIGN IN</em></h2>

        <input type="email" id="loginEmail" placeholder="Email">
        <small class="error" id="loginEmailError"></small>

        <div class="password-box">
            <input type="password" id="loginPassword" placeholder="Password">
            <button type="button" onclick="togglePassword('loginPassword')">👁</button>
        </div>
        <small class="error" id="loginPasswordError"></small>

        <button type="submit">Login</button>

        <p>
            Don't have an account?
            <a href="signin.html">Signup</a>
        </p>
    </form>
</div>

<script src="script.js"></script>
</body>
</html>
