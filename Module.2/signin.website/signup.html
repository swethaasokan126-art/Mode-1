<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Signup</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
    <form id="signupForm" class="form-box">
        <h2><em>SIGNUP</em></h2>

        <input type="text" id="fullname" placeholder="Full Name">
        <small class="error" id="nameError"></small>

        <input type="email" id="email" placeholder="Email">
        <small class="error" id="emailError"></small>

        <input type="text" id="phone" placeholder="Phone Number">
        <small class="error" id="phoneError"></small>

        <input type="text" id="city" placeholder="Location / City">
        <small class="error" id="cityError"></small>

        <div class="password-box">
            <input type="password" id="password" placeholder="Password">
            <button type="button" onclick="togglePassword('password')">👁</button>
        </div>
        <small class="error" id="passwordError"></small>

        <div class="password-box">
            <input type="password" id="confirmPassword" placeholder="Confirm Password">
            <button type="button" onclick="togglePassword('confirmPassword')">👁</button>
        </div>
        <small class="error" id="confirmError"></small>

        <button type="submit">Signup</button>

        <p>
            Already have an account?
            <a href="signin.html">SignIn</a>
        </p>
    </form>
</div>

<script src="script.js"></script>
</body>
</html>
